<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d0f14">
    <title>{% block title %}Monitor Inajá{% endblock %}</title>
    <meta name="description" content="Monitor de publicações oficiais de Inajá-PR no jornal O Regional.">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">OR</span>
          <span>
            <strong>Monitor Inajá</strong>
            <small>O Regional Jornal</small>
          </span>
        </a>

        <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-nav">
          <span></span><span></span><span></span>
        </button>

        <nav class="main-nav" id="main-nav" aria-label="Principal">
          <div class="nav-group" data-zone="leitura">
            <span class="nav-group-label">Leitura</span>
            <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Atos</a>
            <a href="/perguntar" {% if request.url.path == '/perguntar' %}class="active"{% endif %}>Perguntar</a>
            <a href="/exportar" {% if request.url.path == '/exportar' %}class="active"{% endif %}>Exportar</a>
          </div>
          <div class="nav-divider" aria-hidden="true"></div>
          <div class="nav-group" data-zone="operacao">
            <span class="nav-group-label">Operação</span>
            <a href="/operacao" {% if request.url.path == '/operacao' %}class="active"{% endif %}>Painel</a>
            <a href="/edicoes-detectadas" {% if '/edicoes-detectadas' in request.url.path %}class="active"{% endif %}>Edições</a>
            <a href="/revisao/so-mencao" {% if '/revisao/so-mencao' in request.url.path %}class="active"{% endif %}>Só menção</a>
            <a href="/status" {% if request.url.path == '/status' %}class="active"{% endif %}>Fila</a>
            <a href="/notificacoes" {% if request.url.path == '/notificacoes' %}class="active"{% endif %}>Alertas</a>
            <a href="/admin" {% if request.url.path == '/admin' %}class="active"{% endif %}>Admin</a>
          </div>
          <a href="/status" id="global-processing" class="global-processing" style="display:none;" title="Há jobs em execução">
            <span class="processing-dot"></span>Processando
          </a>
        </nav>
      </header>

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
