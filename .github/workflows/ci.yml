name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          AI_REFINE_PUBLICATIONS: "false"
          OPENCODE_API_KEY: ""
          ADMIN_GATE_PASSWORD: "1999"
        run: |
          python -m pytest tests/ -q --tb=short --junitxml=pytest-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml
          if-no-files-found: ignore

      - name: Ruff check (non-blocking soft)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check . --exclude scripts --exclude edicoes --exclude __pycache__
